<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: transparent;
            --text-main: #1a1a1a;
            --text-sub: #555555;
            --box-bg: rgba(255, 255, 255, 0.5);
            --box-border: rgba(0, 0, 0, 0.1);
            --btn-bg: #f3f3f3;
            --btn-border: rgba(0, 0, 0, 0.1);
            --active-tab: #0078D4;
        }

        body.dark-mode {
            --bg-color: #21242b;
            --text-main: #ffffff;
            --text-sub: #cccccc;
            --box-bg: rgba(0, 0, 0, 0.3);
            --box-border: rgba(255, 255, 255, 0.1);
            --btn-bg: rgba(255, 255, 255, 0.1);
            --btn-border: rgba(255, 255, 255, 0.1);
            --active-tab: #60A5FA;
        }

        /* Memaksa list dropdown berwarna gelap di Dark Mode */
        body.dark-mode .jtn-select option {
            background-color: #2b2b2b; /* Latar abu-abu gelap */
            color: #ffffff;            /* Teks putih */
        }

        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }

        /* TITLEBAR */
        .titlebar { height: 35px; width: 100%; -webkit-app-region: drag; flex-shrink: 0; display: flex; align-items: center; padding-left: 15px; }
        .titlebar-icon { width: 16px; height: 16px; margin-right: 10px; object-fit: contain; pointer-events: none; }
        .titlebar-text { font-size: 12px; font-weight: 400; color: var(--text-main); }

        /* LAYOUT MAIN */
        .main-container { display: flex; flex: 1; min-height: 0; }
        
        /* SIDEBAR TABS */
        .tabs { width: 150px; display: flex; flex-direction: column; padding: 10px; border-right: 1px solid var(--box-border); }
        .tab-btn { background: transparent; border: none; text-align: left; padding: 10px 15px; border-radius: 6px; cursor: default; color: var(--text-main); font-family: 'Segoe UI', sans-serif; font-size: 14px; margin-bottom: 5px; transition: 0.2s; }
        .tab-btn:hover { background: var(--box-bg); }
        .tab-btn.active { background: var(--box-bg); font-weight: 600; color: var(--active-tab); }

        /* CONTENT AREA */
        .content-area { flex: 1; padding: 20px 30px; overflow-y: auto; }
        .tab-pane { display: none; animation: fadeIn 0.2s ease; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* SETTINGS ROWS */
        .setting-group { margin-bottom: 20px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 8px 0; }
        .setting-text-main { font-weight: 600; font-size: 14px; }
        .setting-text-sub { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
        
        /* CONTROLS */
        .jtn-select { background: var(--btn-bg); color: var(--text-main); border: 1px solid var(--btn-border); padding: 6px 10px; border-radius: 6px; font-family: 'Segoe UI'; font-size: 13px; width: 160px; outline: none; }
        
        .custom-switch { position: relative; display: inline-block; width: 40px; height: 20px; margin: 0; }
        .custom-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: default; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--box-border); transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #0078D4; }
        input:checked + .slider:before { transform: translateX(20px); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="titlebar">
        <img src="assets/picture/favicon.webp" alt="Icon" class="titlebar-icon">
        <span class="titlebar-text">Pengaturan - JTN Multimedia Hub</span>
    </div>

    <div class="main-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'tab-umum')">Umum</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-tampilan')">Tampilan</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-slide')">Slide Show</button>
        </div>

        <div class="content-area">
            
            <div id="tab-umum" class="tab-pane active">
                <div class="setting-group">
                    <div class="setting-row">
                        <div>
                            <div class="setting-text-main">Jalankan saat Startup</div>
                            <div class="setting-text-sub">Buka otomatis saat PC menyala</div>
                        </div>
                        <label class="custom-switch">
                            <input type="checkbox" id="startupToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    
                    <div class="setting-row hidden" id="bgSettingRow">
                        <div>
                            <div class="setting-text-main">Startup di Belakang</div>
                            <div class="setting-text-sub">Minimalkan ke System Tray saat startup</div>
                        </div>
                        <label class="custom-switch">
                            <input type="checkbox" id="bgToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div id="tab-tampilan" class="tab-pane">
                <div class="setting-group">
                    <div class="setting-row">
                        <div>
                            <div class="setting-text-main">Tema Aplikasi</div>
                            <div class="setting-text-sub">Pilih mode gelap atau terang</div>
                        </div>
                        <select id="themeSelect" class="jtn-select">
                            <option value="system">Bawaan OS</option>
                            <option value="light">Terang</option>
                            <option value="dark">Gelap</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="tab-slide" class="tab-pane">
                <div class="setting-group">
                    <div class="setting-row">
                        <div>
                            <div class="setting-text-main">Monitor Slideshow</div>
                            <div class="setting-text-sub">Pilih layar tayang</div>
                        </div>
                        <select id="projMonitorSelect" class="jtn-select">
                            <option value="auto">Otomatis (Monitor 2)</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-text-main">Tema Slideshow</div></div>
                        <select id="projThemeSelect" class="jtn-select">
                            <option value="dark">Gelap (Teks Putih)</option>
                            <option value="light">Terang (Teks Hitam)</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-text-main">Font Proyektor</div></div>
                        <select id="projFontSelect" class="jtn-select">
                            <option value="'Sora', sans-serif">Sora (Modern)</option>
                            <option value="'Inter', sans-serif">Inter (Baku)</option>
                            <option value="'Playfair Display', serif">Playfair (Klasik)</option>
                            <option value="'Lora', serif">Lora (Tegas)</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-text-main">Ukuran Teks</div></div>
                        <select id="projSizeSelect" class="jtn-select">
                            <option value="4.5vw">Kecil</option>
                            <option value="5.5vw">Normal</option>
                            <option value="6.5vw">Besar</option>
                        </select>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Tab Switcher Logic
        function openTab(evt, tabId) {
            document.querySelectorAll('.tab-pane').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        // Theme Enforcer (Sama dengan About)
        async function applyThemeLocal(themeSetting) {
            let isDark = false;
            if (themeSetting === 'dark') isDark = true;
            else if (themeSetting === 'light') isDark = false;
            else {
                if (window.electronAPI && window.electronAPI.getOSTheme) {
                    isDark = (await window.electronAPI.getOSTheme() === 'dark');
                } else {
                    isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                }
            }
            if (isDark) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');

            if (window.electronAPI && window.electronAPI.updateWCO) {
                window.electronAPI.updateWCO({ color: 'rgba(0,0,0,0)', symbolColor: isDark ? '#ffffff' : '#1a1a1a', height: 35 });
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.electronAPI) return;

            // 1. Inisialisasi Tema Aplikasi
            const currentTheme = await window.electronAPI.getAppTheme();
            document.getElementById('themeSelect').value = currentTheme;
            await applyThemeLocal(currentTheme);

            window.electronAPI.onSyncThemeRealtime(async (theme) => { await applyThemeLocal(theme); });

            document.getElementById('themeSelect').addEventListener('change', (e) => {
                window.electronAPI.setAppTheme(e.target.value);
            });

            // 2. Inisialisasi Startup & Background Task
            const isStartup = await window.electronAPI.getStartupStatus();
            const startupToggle = document.getElementById('startupToggle');
            const bgToggle = document.getElementById('bgToggle');
            const bgSettingRow = document.getElementById('bgSettingRow');

            startupToggle.checked = isStartup;
            if (isStartup) bgSettingRow.classList.remove('hidden');

            const appConfigs = await window.electronAPI.getAppConfigs();
            bgToggle.checked = appConfigs.runInBackground;

            startupToggle.addEventListener('change', (e) => {
                const isChecked = e.target.checked;
                window.electronAPI.toggleStartup(isChecked);
                if (isChecked) bgSettingRow.classList.remove('hidden');
                else {
                    bgSettingRow.classList.add('hidden');
                    bgToggle.checked = false; // Matikan juga jika startup dimatikan
                    window.electronAPI.updateAppConfig('runInBackground', false);
                }
            });

            bgToggle.addEventListener('change', (e) => {
                window.electronAPI.updateAppConfig('runInBackground', e.target.checked);
            });

            // 3. Inisialisasi Projector Settings
            document.getElementById('projThemeSelect').value = appConfigs.projTheme;
            document.getElementById('projFontSelect').value = appConfigs.projFont;
            document.getElementById('projSizeSelect').value = appConfigs.projSize;

            const updateProjector = () => {
                window.electronAPI.updateAppConfig('projTheme', document.getElementById('projThemeSelect').value);
                window.electronAPI.updateAppConfig('projFont', document.getElementById('projFontSelect').value);
                window.electronAPI.updateAppConfig('projSize', document.getElementById('projSizeSelect').value);
            };

            document.getElementById('projThemeSelect').addEventListener('change', updateProjector);
            document.getElementById('projFontSelect').addEventListener('change', updateProjector);
            document.getElementById('projSizeSelect').addEventListener('change', updateProjector);

            // Ambil daftar monitor fisik
            const monSelect = document.getElementById('projMonitorSelect');
            if (window.electronAPI.getDisplays) {
                const displays = await window.electronAPI.getDisplays();
                displays.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.label;
                    monSelect.appendChild(opt);
                });
            }
            monSelect.value = appConfigs.projMonitor || 'auto';
            monSelect.addEventListener('change', () => {
                window.electronAPI.updateAppConfig('projMonitor', monSelect.value);
            });
        });
    </script>
</body>
</html>
