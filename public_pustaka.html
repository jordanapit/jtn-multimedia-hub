<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alkitab dan Kidung - JTN Multimedia Hub</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@ttskch/select2-bootstrap4-theme@1.5.2/dist/select2-bootstrap4.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        /* === RESET & FONT DASAR === */
        body, html { overflow: hidden !important; background: transparent !important; background-color: transparent !important; margin: 0; font-family: 'Instrument Sans', sans-serif; }
        body.electron-app { background: transparent !important; background-color: transparent !important; }
        body.dark-mode::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(30, 33, 40, 0.7); z-index: -1; pointer-events: none; }

        /* === ELECTRON DRAG AREA & CONTROLS === */
        .electron-drag-area { position: fixed; top: 0; left: 48px; right: 300px; height: 35px; -webkit-app-region: drag; z-index: 99998; }

        .btn-uwp-back { position: fixed; top: 0; left: 0; width: 48px; height: 35px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: #1a1a1a; cursor: default !important; z-index: 100000; -webkit-app-region: no-drag; transition: background 0.15s ease; outline: none !important; }
        .btn-uwp-back:hover { background: rgba(0,0,0,0.05); }
        body.dark-mode .btn-uwp-back { color: #ffffff; }
        body.dark-mode .btn-uwp-back:hover { background: rgba(255,255,255,0.1); }

        .app-title-text { display: none !important; }
        body.electron-app .app-title-text { display: flex !important; position: fixed; top: 0; left: 48px; height: 35px; align-items: center; padding-left: 8px; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; font-weight: 400; color: #1a1a1a; z-index: 999999; pointer-events: none; }
        body.dark-mode .app-title-text { color: #ffffff !important; opacity: 0.9; }

        /* TOP RIGHT CONTROLS */
        #top-right-controls { display: none !important; position: fixed; top: 0; right: 140px; height: 35px; z-index: 100000; -webkit-app-region: no-drag; gap: 2px; }
        body.electron-app #top-right-controls.version-ok { display: flex !important; }

        .btn-top-action { width: 46px; height: 100%; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: #1a1a1a; cursor: default !important; transition: all 0.2s ease; outline: none !important;}
        .btn-top-action:hover { background: rgba(0,0,0,0.05); }
        .btn-top-action.active { background: #10b981 !important; color: white !important; }
        body.dark-mode .btn-top-action { color: #ffffff; }
        body.dark-mode .btn-top-action:hover { background: rgba(255,255,255,0.1); }

        /* === FLOATING PRESENTER BAR === */
        #presenter-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0,0,0,0.1); border-radius: 100px; padding: 8px 12px; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); z-index: 100001; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #presenter-bar.show { transform: translateX(-50%) translateY(0); }
        body.dark-mode #presenter-bar { background: rgba(30,33,40,0.9); border-color: rgba(255,255,255,0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }

        .pb-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent; display: flex; align-items: center; justify-content: center; color: #475569; cursor: default !important; transition: 0.2s; outline: none !important;}
        .pb-btn:hover { background: rgba(0,0,0,0.05); color: #1e293b; }
        .pb-btn:active { transform: scale(0.9); }
        body.dark-mode .pb-btn { color: #cbd5e1; }
        body.dark-mode .pb-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        #pb-select { height: 36px; border-radius: 18px; border: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.03); padding: 0 15px; font-family: 'Inter', sans-serif; font-weight: 600; color: #1e293b; font-size: 13px; outline: none; cursor: default !important; max-width: 250px; text-overflow: ellipsis; }
        body.dark-mode #pb-select { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #fff; }

        .pb-divider { width: 1px; height: 20px; background: rgba(0,0,0,0.1); margin: 0 5px; }
        body.dark-mode .pb-divider { background: rgba(255,255,255,0.1); }

        .pb-btn-stop { height: 36px; padding: 0 15px; border-radius: 18px; border: none; background: #ef4444; color: white; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: default !important; transition: 0.2s; outline: none !important;}
        .pb-btn-stop:hover { background: #dc2626; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }

        /* === KONTEN UTAMA (HARD CUT-OFF DI 35PX) === */
        #page-wrapper {
            padding-top: 35px !important; /* TEMBOK FISIK: Dorong paksa semua isi ke bawah titlebar */
        }

        /* === KONTEN UTAMA (DIKUNCI MATI DI BAWAH 35PX) === */
        #scroll-wrapper { 
            position: fixed !important; /* Cabut dari flexbox parent, paku ke layar */
            top: 35px !important; /* HARGA MATI: Dimulai persis di bawah titlebar */
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            overflow-y: auto !important; 
            overflow-x: hidden !important; 
            display: flex !important; 
            flex-direction: column !important; 
            padding-top: 25px !important; 
            padding-bottom: 80px !important;
            margin: 0 !important;
            -webkit-mask-image: none !important;
            mask-image: none !important;
            z-index: 10 !important;
        }

        /* === MATIKAN SELEKSI TEKS UNTUK JUDUL & TITLEBAR === */
        .page-title, 
        .app-title-text, 
        .electron-drag-area,
        .titlebar-mask {
            -webkit-user-select: none !important;
            user-select: none !important;
            cursor: default !important;
        }

        #scroll-wrapper::-webkit-scrollbar { width: 8px; background: transparent; }
        #scroll-wrapper::-webkit-scrollbar-track { background: transparent; }
        #scroll-wrapper::-webkit-scrollbar-thumb { background: transparent; border-radius: 10px; }
        #scroll-wrapper:hover::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); }
        body.dark-mode #scroll-wrapper:hover::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }

        .pustaka-container { flex: 1; display: flex; flex-direction: column; max-width: 1600px; width: 98%; margin: 0 auto; padding: 20px; position: relative; z-index: 10; box-sizing: border-box; }

        /* PERBAIKAN: Menetapkan font spesifik sesuai versi online */
        .container-fluid, .nav-tabs .nav-link, .form-control, .select2-container, label, .page-title { font-family: 'Inter', sans-serif !important; font-weight: 400; color: #475569; }
        .page-title { font-size: 1.6rem; color: #1e293b; margin-bottom: 20px; font-weight: 700 !important; }
        label { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; display: block; font-weight: 600 !important; letter-spacing: 0.05em; }

        /* PERBAIKAN TABS: Pastikan nav-tabs dan tab-pane menggunakan class Bootstrap standar */
        .nav-tabs { border-bottom: none !important; padding-left: 5px; } 
        .nav-tabs .nav-link { background: rgba(255,255,255,0.5); color: #64748b; border: 1px solid rgba(0,0,0,0.1) !important; margin-right: 5px; border-bottom: none !important; border-radius: 8px 8px 0 0; backdrop-filter: blur(10px); outline: none !important; cursor: default !important;}
        .nav-tabs .nav-link.active { background: #fff !important; color: #4e73df !important; font-weight: 600 !important; border-bottom: 2px solid #fff !important; margin-bottom: -1px; z-index: 2; }

        .tab-content-container { flex: 1; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 10px 25px 25px 25px; margin-top: -1px; margin-bottom: 0px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05) !important; display: flex; flex-direction: column; }
        
        /* Modifikasi Bootstrap tab-pane untuk Flexbox */
        .tab-pane { display: none; }
        .tab-pane.active { display: flex !important; flex-direction: column; flex: 1; }

        .text-display { border-radius: 8px; flex: 1; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.05); padding: 30px; line-height: 1.8; color: #334155; }
        .text-display *, .verse-block { font-weight: 400 !important; user-select: text !important; }
        .btn-primary, .btn-success { color: #ffffff !important; font-weight: 600 !important; outline: none !important; cursor: default !important;}

        .verse-block { position: relative; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; border: 1px solid transparent; transition: 0.2s; }
        .verse-block:hover { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.05); }
        .verse-num { color: #10b981; font-weight: 700 !important; display: block; margin-bottom: 3px; font-size: 0.85rem; }
        .btn-copy-hover { position: absolute; right: 15px; top: 15px; background: #4e73df; color: white !important; border: none; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; display: none; cursor: default !important; outline: none !important;}
        .verse-block:hover .btn-copy-hover { display: block; }

        body.presentation-mode .verse-block { cursor: default !important; border: 1px dashed rgba(16, 185, 129, 0.4); }
        body.presentation-mode .verse-block:hover { background: rgba(16, 185, 129, 0.1) !important; border-color: #10b981 !important; transform: translateX(5px); }
        body.presentation-mode .verse-block.live-now { background: #10b981 !important; color: white !important; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); transform: scale(1.02); z-index: 2; border-color: #10b981 !important; }
        body.presentation-mode .verse-block.live-now .verse-num { color: #ffffff !important; }
        body.presentation-mode .verse-block .btn-copy-hover { display: none !important; }

        /* === CUSTOM CONTEXT MENU === */
        #custom-cm { position: absolute; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 6px; z-index: 9999; min-width: 220px; visibility: hidden; opacity: 0; transform: translateY(10px) scale(0.95); transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.2s; pointer-events: none; }
        #custom-cm.active { visibility: visible; opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        .cm-item { padding: 10px 14px; font-size: 0.85rem; color: #1e293b; cursor: default !important; display: flex; align-items: center; gap: 12px; border-radius: 8px; transition: 0.15s; }
        .cm-item:hover { background: #4e73df; color: #fff !important; }
        .cm-item svg { color: #64748b; }
        .cm-item:hover svg { color: #fff !important; }
        .cm-divider { height: 1px; background: rgba(0,0,0,0.05); margin: 4px 8px; }

        .perikop-header, #out_alkitab h5, #out_lagu h5 { margin-top: 25px; margin-bottom: 12px; font-weight: 700 !important; color: #1e293b; font-size: 1.1rem; line-height: 1 !important; }
        
        /* === DARK MODE === */
        body.dark-mode .page-title { color: #ffffff !important; }
        body.dark-mode label { color: #94a3b8 !important; }
        body.dark-mode .nav-tabs .nav-link { background: rgba(30, 30, 30, 0.4) !important; color: #94a3b8 !important; border-color: rgba(255, 255, 255, 0.1) !important; }
        body.dark-mode .nav-tabs .nav-link.active { background: rgba(33, 36, 43, 0.7) !important; color: #8bb0ff !important; border-bottom-color: transparent !important; }
        body.dark-mode .tab-content-container { background: rgba(33, 36, 43, 0.7) !important; border-color: rgba(255, 255, 255, 0.08) !important; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3) !important; }
        body.dark-mode .text-display { background: rgba(0,0,0,0.2) !important; border-color: rgba(255, 255, 255, 0.05) !important; color: #e2e8f0 !important; }
        body.dark-mode .perikop-header, body.dark-mode #out_alkitab h5, body.dark-mode #out_lagu h5 { color: #ffffff !important; }
        body.dark-mode .verse-block:hover { background: rgba(255, 255, 255, 0.05) !important; border-color: rgba(255, 255, 255, 0.1) !important; }
        body.dark-mode .verse-num { color: #34d399 !important; }
        body.dark-mode #custom-cm { background: rgba(33, 36, 43, 0.85) !important; border-color: rgba(255, 255, 255, 0.1) !important; color: #ffffff !important; }
        body.dark-mode .cm-item { color: #e2e8f0 !important; }
        body.dark-mode .cm-item svg { stroke: #94a3b8 !important; }
        body.dark-mode .cm-item:hover { background: #4e73df !important; color: #fff !important; }
        body.dark-mode .cm-item:hover svg { stroke: #fff !important; }
        body.dark-mode .cm-divider { background: rgba(255, 255, 255, 0.1) !important; }
        body.dark-mode .select2-container--bootstrap4 .select2-selection { background-color: rgba(0,0,0,0.3) !important; border-color: rgba(255, 255, 255, 0.1) !important; color: #ffffff !important; }
        body.dark-mode .select2-container--bootstrap4 .select2-selection__rendered { color: #e2e8f0 !important; }
        body.dark-mode .select2-dropdown { background-color: #21242b !important; border-color: #4e73df !important; color: #e2e8f0 !important; }
        body.dark-mode .select2-results__option { color: #e2e8f0 !important; }
        body.dark-mode .select2-results__option--highlighted[aria-selected] { background-color: #4e73df !important; color: #ffffff !important; }
        body.dark-mode .select2-search--dropdown .select2-search__field { background-color: rgba(0,0,0,0.3) !important; border-color: rgba(255, 255, 255, 0.1) !important; color: #ffffff !important; }

        a, button, .btn, .nav-link, .select2-container *, .cm-item, .pb-btn { cursor: default !important; }

        /* === MODAL SETTINGS & EXIT NATIVE === */
        .jtn-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7) !important; z-index: 100005; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out; }
        .jtn-modal.show { opacity: 1; visibility: visible; }
        .settings-content { background: #fff; width: 100%; max-width: 450px; border-radius: 16px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; }
        .jtn-modal.show .settings-content { transform: scale(1); }
        .settings-header { padding: 30px 30px 10px 30px; border-bottom: none; background: #fff; display: flex; justify-content: flex-start; text-align: left; }
        .settings-header h3 { margin: 0; font-size: 20px; font-weight: 700; color: #1a1a1a; font-family: 'Inter', sans-serif; }
        .settings-body { padding: 10px 30px 30px 30px; color: #666; font-size: 15px; line-height: 1.6; text-align: left; } 
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 8px 0; }
        .setting-text-main { font-weight: 600; font-size: 15px; color: #5a5c69; font-family: 'Inter', sans-serif; }
        .setting-text-sub { font-size: 12.8px; color: #858796; margin-top: 4px; font-family: 'Inter', sans-serif; }
        .jtn-select { display: block; width: 140px; height: calc(1.5em + 0.5rem + 2px); padding: 0.25rem 0.5rem; font-size: .875rem; line-height: 1.5; color: #6e707e; background-color: #fff; background-clip: padding-box; border: 1px solid #cbd5e1; border-radius: 8px; transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out; font-weight: 500; cursor: default !important; outline: none; font-family: 'Inter', sans-serif; }
        .settings-divider { border-top: 1px solid #e3e6f0; margin: 10px 0; border-bottom: none; border-left: none; border-right: none; }
        .settings-footer { border-top: none; padding: 0 30px 30px 30px; background: #fff; display: flex; justify-content: flex-end; gap: 10px; width: 100%; }
        .btn-tutup-exact { display: inline-block; background-color: #858796; border: 1px solid #858796; color: #fff !important; border-radius: 8px; font-weight: 600; padding: 0.375rem 1.5rem; cursor: default !important; transition: all .15s ease-in-out; font-size: 1rem; text-align: center; font-family: 'Inter', sans-serif; flex: 1; outline: none !important;}
        .btn-tutup-exact:hover { background-color: #717384; border-color: #6b6d7d; }
        
        .custom-switch { position: relative; display: inline-block; width: 44px; height: 24px; margin: 0; }
        .custom-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }

        body.dark-mode .settings-content { background: #21242b; border: 1px solid rgba(255,255,255,0.1); }
        body.dark-mode .settings-header { background: transparent; }
        body.dark-mode .settings-header h3 { color: #fff; }
        body.dark-mode .setting-text-main { color: #e2e8f0; }
        body.dark-mode .setting-text-sub { color: #adb5bd; }
        body.dark-mode .settings-divider { border-color: rgba(255,255,255,0.1); }
        body.dark-mode .settings-footer { background: transparent; }
        body.dark-mode .jtn-select { background-color: #2d313a; border-color: rgba(255, 255, 255, 0.15); color: #ffffff; }
        body.dark-mode .btn-tutup-exact { background-color: #3b404d; border-color: #3b404d; }
        body.dark-mode .btn-tutup-exact:hover { background-color: #4a505e; border-color: #4a505e; }
        body.dark-mode .exit-text-title { color: #fff !important; }

        /* Kaca pelindung agar konten yang di-scroll menghilang mulus di bawah titlebar */
        .titlebar-mask {
            position: fixed;
            top: 0; left: 0; right: 0; height: 35px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 99997; /* Tepat di bawah tombol kontrol & teks, tapi di atas konten */
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        body.dark-mode .titlebar-mask {
            background: rgba(30, 33, 40, 0.85);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div id="page-wrapper" style="opacity: 0; transition: opacity 0.3s ease; height: 100vh; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box;">

    <div class="electron-drag-area"></div>

    <div class="app-title-text">
        <span id="dyn-app-title" style="transition: opacity 0.3s ease;">Alkitab dan Kidung - JTN Multimedia Hub</span>
    </div>

    <button type="button" class="btn-uwp-back" id="btn-back-trigger">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 8H3M3 8L7 4M3 8L7 12" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div id="top-right-controls">
        <button type="button" class="btn-top-action" onclick="if(window.electronAPI) window.electronAPI.openSettingsWindow()" title="Pengaturan">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
        <button type="button" class="btn-top-action" id="btn-slideshow" onclick="togglePresentation()" title="Mulai Slide Show (F5)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><polygon points="10 7 15 10 10 13 10 7"></polygon><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
        </button>
    </div>

    <div id="presenter-bar">

        <select id="pb-select" onchange="jumpSlide(this.value)"></select>

<script>
// ==========================================
// KENDALI SLIDE SHOW & PAGINATION
// ==========================================
let isPresentationMode = false;
let presentationSlides = []; 
let currentSlideIndex = -1;

function togglePresentation() {
    if (!window.electronAPI) return;
    
    // Kita tangkap DUA-DUANYA agar aman di halaman mana pun!
    const btn = document.getElementById('btn-slideshow');
    const btnNav = document.getElementById('btn-slideshow-nav');
    
    if (!isPresentationMode) {
        // Lempar ID Monitor saat Start
        const selectedMonitor = localStorage.getItem('projMonitor') || 'auto';
        window.electronAPI.startPresentation(selectedMonitor);
        
        isPresentationMode = true;
        
        // Aktifkan tombol yang tersedia tanpa bikin error
        if (btn) btn.classList.add('active');
        if (btnNav) btnNav.classList.add('active');
        
        document.body.classList.add('presentation-mode');
        sendProjectorConfig();
        initPresenterBar();
    } else {
        window.electronAPI.stopPresentation();
        resetPresentationState();
    }
}

function resetPresentationState() {
    isPresentationMode = false;
    
    const btn = document.getElementById('btn-slideshow');
    const btnNav = document.getElementById('btn-slideshow-nav');
    
    if (btn) btn.classList.remove('active');
    if (btnNav) {
        btnNav.classList.remove('active');
        btnNav.title = "Mulai Slide Show (F5)";
        btnNav.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><polygon points="10 7 15 10 10 13 10 7"></polygon><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>';
    }
    
    document.body.classList.remove('presentation-mode');
    document.getElementById('presenter-bar').classList.remove('show');
    $('.verse-block').removeClass('live-now'); 
}

function initPresenterBar() {
    if (!isPresentationMode) return;
    
    const isBible = $('#tab-alkitab').hasClass('active');
    const activeTab = document.querySelector('.tab-pane.active');
    const blocks = Array.from(activeTab.querySelectorAll('.verse-block'));
    
    presentationSlides = [];
    const MAX_CHARS_BIBLE = 130; 
    
    blocks.forEach((block, blockIndex) => {
        let num = $(block).find('.verse-num').text(); 
        let rawText = $(block).data('fulltext') || "";
        
        if (!isBible) {
            let lines = rawText.split('\n');
            let chunks = [];
            for (let j = 0; j < lines.length; j += 2) { chunks.push(lines.slice(j, j + 2).join('\n')); }
            chunks.forEach((chunkText, chunkIndex) => {
                let labelText = num ? `${num} (${chunkIndex + 1}/${chunks.length})` : `Bait ${blockIndex + 1} (${chunkIndex + 1}/${chunks.length})`;
                let passNum = chunkIndex === 0 ? num : ""; 
                presentationSlides.push({ block: block, num: passNum, text: chunkText, label: labelText });
            });
        } else {
            if (rawText.length > MAX_CHARS_BIBLE) {
                let words = rawText.split(' ');
                let chunks = [];
                let currentChunk = '';
                
                for(let word of words) {
                    if((currentChunk + " " + word).length > MAX_CHARS_BIBLE) {
                        if (currentChunk.trim() !== '') chunks.push(currentChunk.trim() + "...");
                        currentChunk = "... " + word;
                    } else {
                        currentChunk += (currentChunk === '' ? '' : ' ') + word;
                    }
                }
                if(currentChunk.trim() !== '') chunks.push(currentChunk.trim());
                
                chunks.forEach((chunkText, chunkIndex) => {
                    let labelText = num ? `${num} (${chunkIndex + 1}/${chunks.length})` : `Ayat ${blockIndex + 1} (${chunkIndex + 1}/${chunks.length})`;
                    let passNum = chunkIndex === 0 ? num : ""; 
                    presentationSlides.push({ block: block, num: passNum, text: chunkText, label: labelText });
                });
            } else {
                let labelText = num ? num : `Ayat ${blockIndex + 1}`;
                presentationSlides.push({ block: block, num: num, text: rawText, label: labelText });
            }
        }
    });

    const select = document.getElementById('pb-select');
    select.innerHTML = '<option value="-1" disabled selected>Pilih Ayat / Reff</option>';
    presentationSlides.forEach((slide, i) => { select.innerHTML += `<option value="${i}">${slide.label}</option>`; });

    if (presentationSlides.length > 0) { document.getElementById('presenter-bar').classList.add('show'); } 
    else { document.getElementById('presenter-bar').classList.remove('show'); }
}

document.addEventListener('keydown', (e) => {
    if (!isPresentationMode) return;
    if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); navSlide(1); }
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); navSlide(-1); }
});

function jumpSlide(index) {
    index = parseInt(index);
    if (index >= 0 && index < presentationSlides.length) {
        currentSlideIndex = index;
        document.getElementById('pb-select').value = index;
        let slide = presentationSlides[index];
        
        $('.verse-block').removeClass('live-now');
        $(slide.block).addClass('live-now');
        slide.block.scrollIntoView({ behavior: 'smooth', block: 'center' });

        let htmlToSend = slide.num 
            ? `<span class="verse-num">${slide.num}</span> ${slide.text.replace(/\n/g, '<br>')}` 
            : slide.text.replace(/\n/g, '<br>');
        window.electronAPI.sendToProjector(htmlToSend);
    }
}

function navSlide(direction) {
    let target = currentSlideIndex + direction;
    if (target >= 0 && target < presentationSlides.length) { jumpSlide(target); }
}

function sendProjectorConfig() {
    if (window.electronAPI && window.electronAPI.updateProjectorConfig) {
        const conf = {
            theme: localStorage.getItem('projTheme') || 'dark',
            font: localStorage.getItem('projFont') || "'Sora', sans-serif",
            size: localStorage.getItem('projSize') || "5.5vw"
        };
        window.electronAPI.updateProjectorConfig(conf);
    }
}

document.addEventListener('keydown', (e) => {
    // F5 berfungsi sebagai tombol Sakelar (Mulai / Hentikan)
    if (e.key === 'F5') { 
        e.preventDefault(); 
        togglePresentation(); 
    }
    // Esc khusus HANYA untuk Menghentikan (jika sedang tayang)
    if (e.key === 'Escape' && isPresentationMode) { 
        e.preventDefault(); 
        togglePresentation(); // Karena statusnya sedang tayang, ini otomatis akan mematikan proyektor
    }
});

if (window.electronAPI && window.electronAPI.onPresentationStopped) {
    window.electronAPI.onPresentationStopped(() => { resetPresentationState(); });
}

function goBackAction() {
    document.getElementById('page-wrapper').style.opacity = '0';
    setTimeout(() => { window.location.href = "login.html"; }, 300);
}

function confirmExit() {
    if(window.electronAPI) window.electronAPI.stopPresentation();
    document.getElementById('exitConfirmModal').classList.remove('show');
    goBackAction();
}

window.addEventListener('beforeunload', () => {
    if (isPresentationMode && window.electronAPI) { window.electronAPI.stopPresentation(); }
});

// ==========================================
// TITLEBAR OBSERVER (DYNAMIC FADE TITLE)
// ==========================================
let titleObserver = null;
const defaultAppTitle = "Alkitab dan Kidung - JTN Multimedia Hub";
const dynTitleEl = document.getElementById('dyn-app-title');

function changeAppTitle(newTitle) {
    if(!dynTitleEl || dynTitleEl.innerText === newTitle) return;
    dynTitleEl.style.opacity = '0';
    setTimeout(() => {
        dynTitleEl.innerText = newTitle;
        dynTitleEl.style.opacity = '1';
    }, 200);
}

function setupTitleObserver(headerSelector) {
    if (titleObserver) titleObserver.disconnect();
    
    const scrollRoot = document.getElementById('scroll-wrapper');
    const headerEl = document.querySelector(headerSelector);
    
    if (!headerEl) { changeAppTitle(defaultAppTitle); return; }

    titleObserver = new IntersectionObserver((entries) => {
        const entry = entries[0];
        if (!entry.isIntersecting && entry.boundingClientRect.y < scrollRoot.getBoundingClientRect().y) {
            let customTitle = headerEl.getAttribute('data-titlebar') || headerEl.innerText;
            changeAppTitle(customTitle + " - JTN Multimedia Hub");
        } else {
            changeAppTitle(defaultAppTitle);
        }
    }, { root: scrollRoot, threshold: 0, rootMargin: "-10px 0px 0px 0px" });

    titleObserver.observe(headerEl);
}

// ==========================================
// GLOBAL THEME & APP INITIALIZATION
// ==========================================
// PERBAIKAN: Fungsi tema sekarang mengambil data dari main.js
async function applyThemeLocally(theme) {
    let isDark = false;
    if (theme === 'dark') { isDark = true; }
    else if (theme === 'light') { isDark = false; }
    else {
        if (window.electronAPI && window.electronAPI.getOSTheme) {
            try { const osTheme = await window.electronAPI.getOSTheme(); isDark = (osTheme === 'dark'); }
            catch (e) { isDark = window.matchMedia('(prefers-color-scheme: dark)').matches; }
        } else { isDark = window.matchMedia('(prefers-color-scheme: dark)').matches; }
    }

    if (isDark) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');

    const themeSelectStand = document.getElementById('themeSelectStand');
    if (themeSelectStand) themeSelectStand.value = theme;

    if (window.electronAPI && window.electronAPI.updateWCO) {
        window.electronAPI.updateWCO({ color: 'rgba(0, 0, 0, 0)', symbolColor: isDark ? '#ffffff' : '#1a1a1a', height: 35 });
    }
}

// Pantau perubahan dari OS secara langsung
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    const currentTheme = localStorage.getItem('appTheme') || 'system';
    if (currentTheme === 'system') applyThemeLocally('system');
});

document.addEventListener("DOMContentLoaded", async function() {
    document.getElementById('page-wrapper').style.opacity = '1';

    if (window.electronAPI) {
        document.body.classList.add('electron-app'); 
        
        // Ambil tema dari Brankas Hardisk (main.js)
        let savedTheme = 'system';
        if (window.electronAPI.getAppTheme) {
            savedTheme = await window.electronAPI.getAppTheme();
        } else {
            savedTheme = localStorage.getItem('appTheme') || 'system';
        }
        applyThemeLocally(savedTheme);
        
        // Sinkronisasi realtime antar window
        if (window.electronAPI.onSyncThemeRealtime) {
            window.electronAPI.onSyncThemeRealtime((theme) => { applyThemeLocally(theme); });
        }

        if (window.electronAPI.getAppVersion) {
            window.electronAPI.getAppVersion().then(version => {
                const vParts = version.split('.').map(Number);
                if (vParts[0] > 1 || (vParts[0] === 1 && vParts[1] > 1) || (vParts[0] === 1 && vParts[1] === 1 && vParts[2] >= 260406)) {
                    document.getElementById('top-right-controls').classList.add('version-ok');
                }
            });
        }

        document.getElementById('btn-back-trigger').addEventListener('click', function() {
            if (isPresentationMode) { document.getElementById('exitConfirmModal').classList.add('show'); } 
            else { goBackAction(); }
        });

    } else {
        // Fallback jika dibuka di browser biasa
        var savedTheme = localStorage.getItem('appTheme') || 'system';
        applyThemeLocally(savedTheme);
    }
});

// ==========================================
// LOGIKA TABS & DATA API (ALKITAB / LAGU)
// ==========================================
window.addEventListener('load', function() {
    (function($) {
        "use strict";
        let lastRightClickedText = "";

        function initS2() { if ($.fn.select2) { $('.s2').select2({ theme: 'bootstrap4', width: '100%' }); } }
        initS2();

        $(document).on('select2:open', () => {
            document.querySelector('.select2-search__field').focus();
        });

        // PERBAIKAN TABS: Menggunakan Bootstrap tab events untuk kelancaran
        $('a[data-toggle="tab"]').on('shown.bs.tab', function (e) {
            if (isPresentationMode) { setTimeout(initPresenterBar, 100); }
            
            const targetId = $(e.target).attr('href'); 
            if(targetId === '#tab-alkitab') { setupTitleObserver('#bible-content h5'); } 
            else { setupTitleObserver('#song-content h5'); }
        });

        window.copyToClipboard = function(text) {
            const el = document.createElement('textarea'); el.value = text.trim(); document.body.appendChild(el);
            el.select(); document.execCommand('copy'); document.body.removeChild(el);
        };
        
        window.copyVerseFromBtn = function(btn) {
            let text = $(btn).closest('.verse-block').attr('data-fulltext');
            if (text) {
                const originalText = text.replace(/&apos;/g, "'").replace(/&quot;/g, '"');
                copyToClipboard(originalText);
                const icon = $(btn).find('svg');
                icon.replaceWith('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>');
                $(btn).css('background', '#10b981').css('color', 'white'); 
                setTimeout(() => { 
                    $(btn).html('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>'); 
                    $(btn).css('background', '#4e73df'); 
                }, 1000);
            }
        };

        function cleanHtml(html) {
            let text = html.replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n');
            let doc = new DOMParser().parseFromString(text, 'text/html');
            return doc.body.textContent || "";
        }

        // ==========================================
        // FETCH API DENGAN SMART CACHE (OFFLINE READY)
        // ==========================================

        // 1. Fetch Daftar Lagu
        $('#b_lagu').on('change', function() {
            const buku = $(this).val();
            const cacheKey = 'jtn_list_' + buku;
            const cachedData = localStorage.getItem(cacheKey);

            function renderOptions(resString) {
                let h = '<option value="">Cari nomor atau judul...</option>';
                const d = JSON.parse(resString);
                if(d.length > 0) { 
                    d.forEach(i => { 
                        let cleanLabel = i.judul.replace(/\s*\(\w+\s+\d+[A-Z]?\)\s*$/, '');
                        cleanLabel = cleanLabel.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                        h += `<option value="${i.nomor}">${i.nomor} - ${cleanLabel}</option>`; 
                    }); 
                }
                $('#n_lagu').html(h).trigger('change');
            }

            $('#n_lagu').html('<option value="">Memuat daftar lagu...</option>');
            
            // Tampilkan dari lokal jika ada
            if (cachedData) renderOptions(cachedData);

            // Cek update ke server jika online
            if (navigator.onLine) {
                $.ajax({
                    url: "https://absen.hkbpjtn.web.id/multimedia/auth/get_song_list",
                    type: "POST", data: { buku: buku },
                    success: function(res) {
                        localStorage.setItem(cacheKey, res); // Simpan/Update Cache
                        if (!cachedData) renderOptions(res); // Render jika tadi belum ada cache
                    },
                    error: function() {
                        if (!cachedData) $('#n_lagu').html('<option value="">Gagal memuat. Periksa internet.</option>');
                    }
                });
            } else if (!cachedData) {
                $('#n_lagu').html('<option value="">Offline: Daftar lagu belum tersimpan.</option>');
            }
        }).trigger('change');

        // 2. Fetch Alkitab
        $('#btn_alkitab').click(function() {
            const v = $('#v_alkitab').val(), k = $('#k_alkitab').val(), p = $('#p_alkitab').val();
            if(!k || !p) return;
            
            const cacheKey = `jtn_alkitab_${v}_${k}_${p}`;
            const cachedData = localStorage.getItem(cacheKey);

            function renderAlkitab(resString) {
                const d = JSON.parse(resString);
                if(d.length > 0) {
                    let labelHeader = (v === 'TOBA') ? (namaBatak[k] || k) : k;
                    let displayTitle = `${labelHeader} ${p}`;
                    let h = `<div id="bible-content"><h5 data-titlebar="${displayTitle}">${displayTitle}</h5>`;
                    
                    let renderedVerses = new Set();
                    d.forEach(ayatDb => {
                        let uniqueKey = `${ayatDb.kitab}_${ayatDb.pasal}_${ayatDb.ayat}`;
                        if (renderedVerses.has(uniqueKey)) return;
                        renderedVerses.add(uniqueKey);
                        let teksTanpaAngka = ayatDb.teks.replace(/^\d+\s+/, '');
                        let safeTeks = teksTanpaAngka.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                        if (ayatDb.perikop && ayatDb.perikop.trim() !== "" && !ayatDb.perikop.includes(':')) {
                            h += `<div class="perikop-header">${ayatDb.perikop}</div>`;
                        }
                        h += `<div class="verse-block" data-fulltext="${safeTeks}">
                                <span class="verse-num">Ayat ${ayatDb.ayat}</span>${teksTanpaAngka}
                                <button class="btn-copy-hover" onclick="copyVerseFromBtn(this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                             </div>`;
                    });
                    h += `</div>`; $('#out_alkitab').html(h);
                    if (isPresentationMode) setTimeout(initPresenterBar, 100);
                    setTimeout(() => setupTitleObserver('#bible-content h5'), 100); 
                } else {
                    $('#out_alkitab').html('<p class="text-center mt-5 text-muted">Data tidak ditemukan.</p>');
                }
            }

            if (!cachedData) $('#out_alkitab').html('<p class="text-center mt-5 text-muted">Mengambil ayat...</p>');
            else renderAlkitab(cachedData);

            if (navigator.onLine) {
                $.post("https://absen.hkbpjtn.web.id/multimedia/auth/get_alkitab", { versi:v, kitab:k, pasal:p }, function(res) {
                    localStorage.setItem(cacheKey, res);
                    if (!cachedData) renderAlkitab(res);
                }).fail(function() { 
                    if (!cachedData) $('#out_alkitab').html('<p class="text-center mt-5 text-danger">Gagal menghubungi server.</p>'); 
                });
            } else if (!cachedData) {
                $('#out_alkitab').html('<p class="text-center mt-5 text-danger">Anda Offline. Kitab ini belum tersimpan di komputer.</p>');
            }
        });

        // 3. Fetch Lagu/Kidung
        $('#btn_lagu').click(function() {
            const b = $('#b_lagu').val(), n = $('#n_lagu').val();
            const judulFull = $('#n_lagu option:selected').text();
            let j = judulFull.replace(/\s*\(\w+\s+\d+[A-Z]?\)\s*$/, '').replace(/^\d+[A-Z]?\s*-\s*/, '');
            let jFinal = j.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            if(!n) return;

            const cacheKey = `jtn_lagu_${b}_${n}`;
            const cachedData = localStorage.getItem(cacheKey);

            function renderLagu(resString) {
                const d = JSON.parse(resString);
                if(d.length > 0) {
                    let displayBuku = (b === 'ENDE') ? 'BE' : b; 
                    let titlebarTitle = `${displayBuku} ${n}: ${jFinal}`; 
                    let h = `<div id="song-content"><h5 data-titlebar="${titlebarTitle}">${jFinal}</h5><hr>`;
                    
                    d.forEach(songData => {
                        const lines = cleanHtml(songData.teks).split('\n');
                        let currentVHeader = ""; let currentVContent = [];
                        lines.forEach((line) => {
                            let t = line.trim();
                            if(t === "" || /^(BN|BE|BL)\s+No\./i.test(t) || t.includes('= Do') || t.includes('Bes =') || t.toLowerCase() === 'versi' || t.toLowerCase() === 'version') return;
                            let isPureNumber = /^\d+$/.test(t); let startsWithNumber = /^(\d+)([\.\s]+)/.test(t); let isReff = t.toLowerCase().startsWith('reff:') || t.toLowerCase() === 'reff';
                            if(isPureNumber || startsWithNumber || isReff) {
                                if (isPureNumber && t === currentVHeader && currentVContent.length === 0) return;
                                if(currentVContent.length > 0) { h += renderVerse(currentVHeader, currentVContent); currentVContent = []; }
                                if(isReff) { currentVHeader = "Reff:"; let clean = t.replace(/^reff:?[\s\.]*/i, '').trim(); if(clean) currentVContent.push(clean); } 
                                else if(isPureNumber) { currentVHeader = t; } 
                                else { let match = t.match(/^(\d+)([\.\s]+)/); currentVHeader = match[1]; let clean = t.replace(/^(\d+)([\.\s]+)/, '').trim(); if(clean) currentVContent.push(clean); }
                            } else { currentVContent.push(t); }
                        });
                        if(currentVContent.length > 0) { h += renderVerse(currentVHeader, currentVContent); }
                    });
                    h += '</div>'; $('#out_lagu').html(h);
                    if (isPresentationMode) setTimeout(initPresenterBar, 100);
                    setTimeout(() => setupTitleObserver('#song-content h5'), 100); 
                } else { $('#out_lagu').html('<p class="text-center mt-5 text-muted">Lagu tidak ditemukan.</p>'); }
            }

            if (!cachedData) $('#out_lagu').html('<p class="text-center mt-5 text-muted">Membuka lirik...</p>');
            else renderLagu(cachedData);

            if (navigator.onLine) {
                $.post("https://absen.hkbpjtn.web.id/multimedia/auth/get_nyanyian", { buku:b, nomor:n }, function(res) {
                    localStorage.setItem(cacheKey, res);
                    if (!cachedData) renderLagu(res);
                }).fail(function() { 
                    if (!cachedData) $('#out_lagu').html('<p class="text-center mt-5 text-danger">Gagal menghubungi server.</p>'); 
                });
            } else if (!cachedData) {
                $('#out_lagu').html('<p class="text-center mt-5 text-danger">Anda Offline. Lagu ini belum tersimpan di komputer.</p>');
            }
        });

        function renderVerse(header, lines) {
            const content = lines.join('\n');
            const safeContent = content.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
            return `<div class="verse-block" data-fulltext="${safeContent}">
                        ${header ? '<span class="verse-num">'+header+'</span>' : ''}
                        ${lines.join('<br>')}
                        <button class="btn-copy-hover" onclick="copyVerseFromBtn(this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                    </div>`;
        }

        $(document).on('click', '.verse-block', function(e) {
            if (!isPresentationMode) return; 
            if ($(e.target).closest('.btn-copy-hover').length > 0) return;

            let slideIndex = presentationSlides.findIndex(s => s.block === this);
            if(slideIndex !== -1) { jumpSlide(slideIndex); }
        });

        $(document).on('contextmenu', '.verse-block, #song-content, #bible-content', function(e) {
            e.preventDefault();
            const targetBlock = $(e.target).closest('.verse-block');
            lastRightClickedText = targetBlock.data('fulltext') || "";
            const isBible = $('#tab-alkitab').hasClass('active');
            $('#cm-text-all').html(isBible ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg> Salin seluruh pasal' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> Salin seluruh lagu');
            const menu = $('#custom-cm');
            let x = e.pageX; let y = e.pageY; const winW = $(window).width(); const winH = $(window).height();
            if (x + menu.outerWidth() > winW) x -= menu.outerWidth();
            if (y + menu.outerHeight() > winH) y -= menu.outerHeight();
            menu.removeClass('active');
            setTimeout(() => { menu.css({ top: y + "px", left: x + "px" }).addClass('active'); }, 10);
        });

        $(document).on('click', function(e) { 
            if (!$(e.target).closest('.context-menu-popup').length) { $('#custom-cm').removeClass('active'); }
        });

        window.cmAction = function(type) {
            if (type === 'selection') { const s = window.getSelection().toString(); if (s) copyToClipboard(s); } 
            else if (type === 'verse') { if(lastRightClickedText) { copyToClipboard(lastRightClickedText); } } 
            else if (type === 'all') {
                const isBible = $('#tab-alkitab').hasClass('active'); const contentId = isBible ? '#bible-content' : '#song-content';
                let title = $(contentId).find('h5').first().text(); let full = title + "\n" + "=".repeat(title.length) + "\n\n";
                $(contentId).find('.verse-block').each(function() {
                    let num = $(this).find('.verse-num').text(); let body = $(this).data('fulltext');
                    if(num) full += "[" + num + "]\n"; full += body + "\n\n";
                });
                if(full) copyToClipboard(full);
            }
            $('#custom-cm').removeClass('active');
        };

        const bD = { "Kejadian": 50, "Keluaran": 40, "Imamat": 27, "Bilangan": 36, "Ulangan": 34, "Yosua": 24, "Hakim-hakim": 21, "Rut": 4, "1 Samuel": 31, "2 Samuel": 24, "1 Raja-raja": 22, "2 Raja-raja": 25, "1 Tawarikh": 29, "2 Tawarikh": 36, "Ezra": 10, "Nehemia": 13, "Ester": 10, "Ayub": 42, "Mazmur": 150, "Amsal": 31, "Pengkhotbah": 12, "Kidung Agung": 8, "Yesaya": 66, "Yeremia": 52, "Ratapan": 5, "Yehezkiel": 48, "Daniel": 12, "Hosea": 14, "Yoel": 3, "Amos": 9, "Obaja": 1, "Yunus": 4, "Mikha": 7, "Nahum": 3, "Habakuk": 3, "Zefanya": 3, "Hagai": 2, "Zakharia": 14, "Maleakhi": 4, "Matius": 28, "Markus": 16, "Lukas": 24, "Yohanes": 21, "Kisah Para Rasul": 28, "Roma": 16, "1 Korintus": 16, "2 Korintus": 13, "Galatia": 6, "Efesus": 6, "Filipi": 4, "Kolose": 4, "1 Tesalonika": 5, "2 Tesalonika": 3, "1 Timotius": 6, "2 Timotius": 4, "Titus": 3, "Filemon": 1, "Ibrani": 13, "Yakobus": 5, "1 Petrus": 5, "2 Petrus": 3, "1 Yohanes": 5, "2 Yohanes": 1, "3 Yohanes": 1, "Yudas": 1, "Wahyu": 22 };
        const namaBatak = { "Kejadian": "1 Musa", "Keluaran": "2 Musa", "Imamat": "3 Musa", "Bilangan": "4 Musa", "Ulangan": "5 Musa", "Yosua": "Josua", "Hakim-hakim": "Panguhum", "Rut": "Rut", "1 Samuel": "1 Samuel", "2 Samuel": "2 Samuel", "1 Raja-raja": "1 Raja-raja", "2 Raja-raja": "2 Raja-raja", "1 Tawarikh": "1 Kronika", "2 Tawarikh": "2 Kronika", "Ezra": "Esra", "Nehemia": "Nehemia", "Ester": "Ester", "Ayub": "Job", "Mazmur": "Psalmen", "Amsal": "Poda", "Pengkhotbah": "Parjamita", "Kidung Agung": "Ende ni si Salomo", "Yesaya": "Jesaya", "Yeremia": "Jeremia", "Ratapan": "Andung-andung", "Yehezkiel": "Hesekiel", "Daniel": "Daniel", "Hosea": "Hosea", "Yoel": "Joel", "Amos": "Amos", "Obaja": "Obaja", "Yunus": "Jona", "Mikha": "Mika", "Nahum": "Nahum", "Habakuk": "Habakuk", "Zefanya": "Sepania", "Hagai": "Haggai", "Zakharia": "Sakaria", "Maleakhi": "Maleaki", "Matius": "Mateus", "Markus": "Markus", "Lukas": "Lukas", "Yohanes": "Johannes", "Kisah Para Rasul": "Ulaon ni Apostel", "Roma": "Rom", "1 Korintus": "1 Korint", "2 Korintus": "2 Korint", "Galatia": "Galatia", "Efesus": "Epesus", "Filipi": "Pilippi", "Kolose": "Kolosse", "1 Tesalonika": "1 Tessalonik", "2 Tesalonika": "2 Tessalonik", "1 Timotius": "1 Timoteus", "2 Timotius": "2 Timoteus", "Titus": "Titus", "Filemon": "Pilemon", "Ibrani": "Heber", "Yakobus": "Jakobus", "1 Petrus": "1 Petrus", "2 Petrus": "2 Petrus", "1 Yohanes": "1 Johannes", "2 Yohanes": "2 Johannes", "3 Yohanes": "3 Johannes", "Yudas": "Judas", "Wahyu": "Pangungkapon" };

        // ==========================================
        // LOGIKA DROPDOWN DINAMIS (MENDUKUNG DATABASE CICILAN)
        // ==========================================
        let currentBibleStructure = {};

        function loadBibleStructure(versi) {
            const cacheKey = 'jtn_bible_struct_' + versi;
            const cachedData = localStorage.getItem(cacheKey);

            function renderStructure(dataStr) {
                try {
                    currentBibleStructure = JSON.parse(dataStr);
                    renderDropdownKitab();
                } catch(e) {}
            }

            if (cachedData) renderStructure(cachedData);

            // Deteksi URL otomatis agar bisa dipakai di User.php, Auth.php, maupun Electron
            let apiUrl = "https://absen.hkbpjtn.web.id/multimedia/auth/get_bible_structure"; // Default fallback (Electron)
            if (window.location.href.includes('/user/')) {
                apiUrl = "<?= base_url('user/get_bible_structure'); ?>";
            } else if (window.location.href.includes('/auth/')) {
                apiUrl = "<?= base_url('auth/get_bible_structure'); ?>";
            }

            if (navigator.onLine) {
                $.post(apiUrl, { versi: versi }, function(res) {
                    localStorage.setItem(cacheKey, res); // Simpan Cache untuk Offline Mode!
                    if (!cachedData) renderStructure(res);
                }).fail(function() {
                    if (!cachedData) $('#k_alkitab').html('<option value="">Gagal koneksi server...</option>');
                });
            } else if (!cachedData) {
                $('#k_alkitab').html('<option value="">Offline: Data struktur belum tersimpan</option>');
            }
        }

        function renderDropdownKitab() {
            const v = $('#v_alkitab').val(); 
            let kH = '<option value="">Pilih Kitab...</option>';
            
            // Urutkan kitab sesuai urutan asli Alkitab (pakai array dari bD)
            const standardOrder = Object.keys(bD);
            const availableBooks = Object.keys(currentBibleStructure).sort((a, b) => {
                return standardOrder.indexOf(a) - standardOrder.indexOf(b);
            });

            // Loop hanya kitab yang ADA DI DATABASE
            availableBooks.forEach(k => {
                kH += `<option value="${k}">${(v === 'TOBA' ? namaBatak[k] : k)}</option>`;
            });

            let s = $('#k_alkitab').val(); 
            $('#k_alkitab').html(kH);
            
            if(s && availableBooks.includes(s)) {
                $('#k_alkitab').val(s).trigger('change');
            } else {
                $('#p_alkitab').html('<option value="">Pasal...</option>').trigger('change');
            }
        }

        $('#v_alkitab').on('change', function() { 
            $('#k_alkitab').html('<option value="">Memuat data kitab...</option>');
            $('#p_alkitab').html('<option value="">Pasal...</option>');
            loadBibleStructure($(this).val()); 
        });
        
        $('#k_alkitab').on('change', function() {
            const k = $(this).val(); 
            let pH = '<option value="">Pasal...</option>';
            
            // Render hanya pasal yang ADA DI DATABASE
            if(k && currentBibleStructure[k]) {
                currentBibleStructure[k].forEach(pasal => {
                    pH += `<option value="${pasal}">${pasal}</option>`;
                });
            }
            $('#p_alkitab').html(pH).trigger('change');
        });

        // Tarik struktur data saat halaman pertama kali termuat
        loadBibleStructure($('#v_alkitab').val());
    })(jQuery);
});
</script>
